<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carnicería Arias | Cortes de Primera</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #000; color: #fff; overflow: hidden; }
        
        /* Contenedor principal con la imagen de carnicería real */
        .hero-bg {
            position: relative;
            height: h-screen;
            width: w-full;
            /* Imagen de CARNICERÍA */
            background: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, rgba(0,0,0,1) 100%), 
                        url('https://images.unsplash.com/photo-1593031252721-6548174f4a3e?q=80&w=2000');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            items-center;
            justify-center;
            px-6;
        }

        /* Capa de neblina de frío animada */
        .cold-mist {
            position: absolute;
            inset: 0;
            background: linear-gradient(to right, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 50%, rgba(255,255,255,0.1) 100%);
            opacity: 0;
            animation: mist-pulse 4s ease-in-out infinite;
            pointer-events: none; /* No interfiere con los clics */
            z-index: 5;
        }

        /* Animación de pulso para la neblina */
        @keyframes mist-pulse {
            0% { opacity: 0; transform: translateX(-20%); }
            50% { opacity: 0.3; transform: translateX(0%); }
            100% { opacity: 0; transform: translateX(20%); }
        }

        .btn-whatsapp {
            background-color: #25D366;
            transition: all 0.3s ease;
            position: relative;
            z-index: 10; /* Asegura que el botón esté por encima de la neblina */
        }
        .btn-whatsapp:hover { 
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(37,211,102,0.5);
        }
    </style>
</head>
<body class="antialiased selection:bg-green-500/30">

    <section class="hero-bg">
        
        <div class="cold-mist"></div>

        <div class="relative z-10 text-center">
            <div class="mb-12">
                <h1 class="text-6xl md:text-9xl font-black tracking-tighter uppercase italic border-b-8 border-white inline-block mb-4 leading-none">
                    ARIAS
                </h1>
                <p class="text-xl md:text-2xl font-bold tracking-[0.5em] uppercase opacity-70">
                    Carnicería
                </p>
            </div>

            <div class="max-w-4xl mb-10 mx-auto">
                <p class="text-xl md:text-4xl font-bold leading-tight mb-6 text-shadow-lg">
                    Hacé tu pedido ahora y nuestro <span class="text-green-500 italic">Encargado</span> te atiende en el acto. 
                </p>
                <div class="text-md md:text-xl font-black tracking-widest text-stone-300 uppercase">
                    VACUNA • POLLO • CERDO
                </div>
            </div>

            <a href="https://wa.me/{{ phone_number }}?text=Hola!%20Vengo%20de%20la%20web%20de%20Carnicería%20Arias.%20Quiero%20hacer%20un%20pedido." 
               class="btn-whatsapp flex items-center gap-4 px-12 py-6 rounded-2xl text-black font-black uppercase text-xl shadow-2xl">
                <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.588-5.946 0-6.556 5.332-11.888 11.888-11.888 3.176 0 6.161 1.237 8.404 3.48s3.481 5.229 3.481 8.406c0 6.555-5.332 11.887-11.888 11.887-2.015 0-4.001-.512-5.756-1.486l-6.128 1.61zm6.426-4.503l.363.215c1.554.921 3.35 1.408 5.186 1.408 5.432 0 9.854-4.422 9.854-9.855 0-2.632-1.024-5.105-2.885-6.965s-4.333-2.885-6.966-2.885c-5.433 0-9.855 4.422-9.855 9.855 0 1.954.582 3.856 1.681 5.467l.236.345-1.008 3.682 3.774-.99z"/></svg>
                PEDIR POR WHATSAPP
            </a>
        </div>

    </section>

    <footer class="absolute bottom-8 w-full text-center z-20">
        <p class="text-[10px] uppercase tracking-[0.6em] opacity-30 italic">
            &copy; 2026 Carnicería Arias | Tradición y Calidad
        </p>
    </footer>

</body>
</html>
